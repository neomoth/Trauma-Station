- type: entity
  parent: BaseGameRule
  id: CosmicCult
  components:
  - type: CosmicCultRule
  - type: LoadMapRule
    mapPath: /Maps/_DV/Nonstations/cosmicvoid.yml
  - type: GameRule
    minPlayers: 15 # Ultra lowpop cult is now possible. Would it be good? Idk we'd have to test that.
  - type: AntagObjectives
    objectives:
    - CosmicFinalityObjective
    - CosmicMonumentObjective
    - CosmicEntropyObjective
  - type: AntagSelection
    definitions:
    - prefRoles: [ CosmicAntagCultist ]
      min: 2
      max: 6
      playerRatio: 10
      jobBlacklist: [ Chaplain ] # GOOBSTATION
      blacklist:
        components:
        - CommandStaff # GOOBSTATION
        - AntagImmune
        - BibleUser
      components:
      - type: CosmicCult
      mindRoles:
      - MindRoleCosmicCult
  - type: AntagPlayerEffects
    effects:
    - !type:GrantSkills
      skills:
        MeleeKnowledge: 60 # They like, only have melee weapons
