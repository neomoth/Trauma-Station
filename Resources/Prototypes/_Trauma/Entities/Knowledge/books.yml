- type: cargoProduct
  id: RandomSkillbooks
  icon:
    sprite: Objects/Misc/books.rsi
    state: book_icon
  product: CrateRandomSkillbooks
  cost: 2000
  category: cargoproduct-category-name-service
  group: market

- type: entity
  parent: CrateGenericSteel
  id: CrateRandomSkillbooks
  name: skillbooks crate
  description: Contains skillbooks.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: RandomSkillbook

- type: entityTable
  id: RandomSkillbook
  table: !type:GroupSelector
    children:
    - id: BookStrength
    - id: BookCombat
    - id: BookSurgery
    - id: BookMagicalLiteracy
    - id: BookLiteracy
    - id: BookJanitor
    - id: BookLanguageTauCeti
    - id: BookHandmade
    - id: BookSurvival
    - id: BookMaterials
    - id: BookDoors
    - id: BookAirlocks
    - id: BookToys
    - id: BookBananium
    - id: BookBots
    - id: BookFurniture
    - id: BookInfrastructure
    - id: BookElectronics
    - id: BookWalls
    - id: BookWindows
    - id: BookSmokeables

- type: entity
  parent: BaseItem
  id: BookSkillbook
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Misc/skillbooks.rsi
    layers:
    - state: base
  - type: StaticPrice
    price: 20
  - type: KnowledgeGrantOnUse
    singleUse: false # crew books are for sharing
  - type: Tag
    tags:
    - Book
  - type: Item
    size: Small

# TODO: These should just give you an xp gain buff rather than make you stronge bruh
- type: entity
  parent: BookSkillbook
  id: BookSchematic
  name: blueprint
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Misc/schematics.rsi

- type: entity
  parent: BookSkillbook
  id: BookStrength
  name: old book
  suffix: strength
  description: It contains drawn instructions of curl-ups and sit-ups.
  components:
  - type: Sprite
    layers:
    - state: strength
  - type: KnowledgeGrantOnUse
    skills:
      StrengthKnowledge: 10
      AthleticsKnowledge: 10
      ToughnessKnowledge: 10
    experience:
      StrengthKnowledge: 3
      AthleticsKnowledge: 3
      ToughnessKnowledge: 3
    doAfter: 2

