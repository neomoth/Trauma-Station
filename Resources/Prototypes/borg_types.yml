# Generic borg
- type: borgType
  id: generic

  # Description
  dummyPrototype: BorgChassisGeneric

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleScience #until sciborgs are added

  defaultModules:
  - BorgModulePrying
  - BorgModuleTool
  - BorgModuleInflatable
  - BorgModuleArtifact
  - BorgModuleAnomaly
  radioChannels:
  - Science

  # <Trauma>
  addComponents:
  - type: ModifyKnowledgeGrant
    skills:
      ScienceKnowledge: 50 # not good at much else
      MaterialsKnowledge: 10
      BotsKnowledge: 50
      InfrastructureKnowledge: 20
      WallsKnowledge: 20 # containing anoms or whatever
      WindowsKnowledge: 20
  # </Trauma>

  # Visual
  inventoryTemplateId: borgShort
  spriteBodyState: robot
  spriteHasMindState: robot_e
  spriteNoMindState: robot_e_r
  spriteToggleLightState: robot_l

  # Pet
  petSuccessString: petting-success-generic-cyborg
  petFailureString: petting-failure-generic-cyborg


